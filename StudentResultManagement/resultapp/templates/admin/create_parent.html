{% extends 'admin_base.html' %}
{% load static %}
{% block content %}

<div class="container">
    <h2 class="mb-4"><i class="fas fa-user-plus"></i> Create Parent Account</h2>
    
    {% if messages %}
        {% for m in messages %}
            <div class="alert alert-{% if m.tags == 'error' %}danger{% else %}{{m.tags}}{% endif %} alert-dismissible fade show" role="alert">
                {{m}}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}
    
    <form method="post">
        {% csrf_token %}
        
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="first_name" class="form-label">First Name</label>
                <input type="text" class="form-control" id="first_name" name="first_name" required>
            </div>
            
            <div class="col-md-6 mb-3">
                <label for="last_name" class="form-label">Last Name</label>
                <input type="text" class="form-control" id="last_name" name="last_name" required>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            
            <div class="col-md-6 mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
        </div>
        
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required>
        </div>
        
        <div class="mb-3">
            <label for="phone" class="form-label">Phone Number</label>
            <input type="tel" class="form-control" id="phone" name="phone" required>
        </div>
        
        <div class="mb-3">
            <label for="address" class="form-label">Address</label>
            <textarea class="form-control" id="address" name="address" rows="3" required></textarea>
        </div>
        
        <div class="mb-3">
            <label for="student" class="form-label">Select Student</label>
            <select class="form-select" id="student" name="student" required>
                <option value="">--Select Student--</option>
                {% for student in students %}
                    <option value="{{ student.id }}">{{ student.name }} - {{ student.roll_id }} ({{ student.student_class }})</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="mb-3">
            <label for="relationship" class="form-label">Relationship</label>
            <select class="form-select" id="relationship" name="relationship" required>
                <option value="">--Select Relationship--</option>
                <option value="father">Father</option>
                <option value="mother">Mother</option>
                <option value="guardian">Guardian</option>
            </select>
        </div>
        
        <button type="submit" class="btn btn-success">
            <i class="fas fa-check-circle me-1"></i>Create Account
        </button>
        <a href="{% url 'manage_parents' %}" class="btn btn-secondary">
            <i class="fas fa-times me-1"></i>Cancel
        </a>
    </form>
</div>

{% endblock %}
